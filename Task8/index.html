<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FinTrack Pro</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>
<body>
    <div class="container">
        <!-- Sidebar -->
        <aside class="sidebar">
            <div class="logo">
                <i class="fas fa-wallet"></i>
                <h1>FinTrack</h1>
            </div>
            <nav>
                <ul>
                    <li class="active" data-section="dashboard"><i class="fas fa-home"></i> Dashboard</li>
                    <li data-section="transactions"><i class="fas fa-list"></i> Transactions</li>
                    <li data-section="reports"><i class="fas fa-chart-pie"></i> Reports</li>
                    <li data-section="settings"><i class="fas fa-cog"></i> Settings</li>
                </ul>
            </nav>
            <div class="sidebar-footer">
                <button id="reset-btn" class="reset-btn"><i class="fas fa-trash"></i> Reset Data</button>
            </div>
        </aside>

        <!-- Main Content -->
        <main class="main-content">
            <!-- Header -->
            <header class="header">
                <div class="header-left">
                    <h2 id="page-title">Dashboard</h2>
                </div>
                <div class="header-right">
                    <div class="currency-selector">
                        <select id="currency-select">
                            <option value="USD">USD</option>
                            <option value="EUR">EUR</option>
                            <option value="GBP">GBP</option>
                            <option value="INR">INR</option>
                            <option value="JPY">JPY</option>
                        </select>
                    </div>
                    <button id="dark-mode-toggle" class="theme-toggle">
                        <i class="fas fa-moon"></i>
                    </button>
                    <div class="profile">
                        <div id="profile-pic" class="profile-pic">👤</div>
                        <div class="profile-info">
                            <span id="user-name">Guest User</span>
                            <small id="preferred-currency">USD</small>
                        </div>
                    </div>
                </div>
            </header>

            <!-- Dashboard Section -->
            <section id="dashboard-section" class="section active">
                <div class="summary-cards">
                    <div class="card balance-card">
                        <div class="card-icon"><i class="fas fa-balance-scale"></i></div>
                        <div>
                            <p class="card-label">Total Balance</p>
                            <h3 id="total-balance">$0.00</h3>
                        </div>
                    </div>
                    <div class="card income-card">
                        <div class="card-icon"><i class="fas fa-arrow-up text-green"></i></div>
                        <div>
                            <p class="card-label">Total Income</p>
                            <h3 id="total-income">$0.00</h3>
                        </div>
                    </div>
                    <div class="card expense-card">
                        <div class="card-icon"><i class="fas fa-arrow-down text-red"></i></div>
                        <div>
                            <p class="card-label">Total Expenses</p>
                            <h3 id="total-expense">$0.00</h3>
                        </div>
                    </div>
                </div>

                <!-- Add Transaction -->
                <div class="add-transaction">
                    <h3>Add New Transaction</h3>
                    <form id="transaction-form">
                        <div class="form-group">
                            <input type="text" id="description" placeholder="Description" required>
                        </div>
                        <div class="form-row">
                            <div class="form-group">
                                <select id="type" required>
                                    <option value="expense">Expense</option>
                                    <option value="income">Income</option>
                                </select>
                            </div>
                            <div class="form-group">
                                <input type="number" id="amount" placeholder="Amount" step="0.01" required>
                            </div>
                            <div class="form-group">
                                <select id="trans-currency">
                                    <option value="USD">USD</option>
                                    <option value="EUR">EUR</option>
                                    <option value="GBP">GBP</option>
                                    <option value="INR">INR</option>
                                    <option value="JPY">JPY</option>
                                </select>
                            </div>
                            <div class="form-group">
                                <input type="date" id="date" required>
                            </div>
                        </div>
                        <button type="submit" class="add-btn">Add Transaction</button>
                    </form>
                </div>

                <!-- Recent Transactions -->
                <div class="recent-transactions">
                    <div class="section-header">
                        <h3>Recent Transactions</h3>
                        <button id="view-all-btn">View All</button>
                    </div>
                    <ul id="recent-list" class="transaction-list"></ul>
                </div>

                <!-- Chart -->
                <div class="chart-container">
                    <h3>Cash Flow</h3>
                    <canvas id="cashflow-chart"></canvas>
                </div>
            </section>

            <!-- Transactions Section -->
            <section id="transactions-section" class="section">
                <div class="filters">
                    <div class="filter-group">
                        <button class="filter-btn active" data-filter="all">All</button>
                        <button class="filter-btn" data-filter="income">Income</button>
                        <button class="filter-btn" data-filter="expense">Expense</button>
                    </div>
                    <input type="text" id="search-input" placeholder="Search transactions...">
                </div>
                <ul id="full-transaction-list" class="transaction-list"></ul>
            </section>

            <!-- Reports Section -->
            <section id="reports-section" class="section">
                <div class="chart-container">
                    <h3>Expense Breakdown</h3>
                    <canvas id="pie-chart"></canvas>
                </div>
            </section>

            <!-- Settings Section -->
            <section id="settings-section" class="section">
                <div class="settings-form">
                    <h3>Profile Settings</h3>
                    <div class="form-group">
                        <label for="profile-name">Name</label>
                        <input type="text" id="profile-name" placeholder="Your Name">
                    </div>
                    <div class="form-group">
                        <label for="default-currency">Preferred Currency</label>
                        <select id="default-currency">
                            <option value="USD">USD</option>
                            <option value="EUR">EUR</option>
                            <option value="GBP">GBP</option>
                            <option value="INR">INR</option>
                            <option value="JPY">JPY</option>
                        </select>
                    </div>
                    <button id="save-profile-btn" class="save-btn">Save Profile</button>
                </div>
                <div class="data-management">
                    <h3>Data Management</h3>
                    <button id="export-btn">Export Data (JSON)</button>
                    <button id="import-btn">Import Data</button>
                    <input type="file" id="import-file" accept=".json" style="display:none;">
                </div>
            </section>
        </main>
    </div>

    <script src="script.js"></script>
</body>
</html>
